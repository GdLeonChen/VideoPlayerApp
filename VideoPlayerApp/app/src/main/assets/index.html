<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>视频播放器</title>
    <style>
        /* ═══════════════════════════════════════════════════════════
           设计令牌系统
        ═══════════════════════════════════════════════════════════ */
        :root {
            /* 色彩令牌 */
            --color-primary-100: rgba(59, 130, 246, 0.15);
            --color-primary-500: rgba(59, 130, 246, 0.9);
            --color-primary-glow: rgba(59, 130, 246, 0.3);

            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-error: #ef4444;

            --color-surface-0: #000000;
            --color-surface-50: rgba(255, 255, 255, 0.03);
            --color-surface-100: rgba(255, 255, 255, 0.08);
            --color-surface-200: rgba(255, 255, 255, 0.12);
            --color-surface-300: rgba(255, 255, 255, 0.18);

            --color-text-primary: #ffffff;
            --color-text-secondary: rgba(255, 255, 255, 0.7);
            --color-text-tertiary: rgba(255, 255, 255, 0.5);

            /* 字体令牌 */
            --font-family-primary: -apple-system, 'PingFang SC', 'Helvetica Neue', 'Noto Sans SC', Arial, sans-serif;
            --font-family-mono: 'SF Mono', 'Roboto Mono', 'Consolas', monospace;

            --font-size-xs: 11px;
            --font-size-sm: 13px;
            --font-size-base: 15px;
            --font-size-lg: 17px;
            --font-size-xl: 20px;
            --font-size-2xl: 24px;
            --font-size-3xl: 30px;

            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;

            --line-height-tight: 1.2;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.75;

            /* 间距令牌 */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;

            /* 圆角令牌 */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --radius-2xl: 28px;
            --radius-full: 9999px;

            /* 阴影令牌 */
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.4);

            /* 过渡令牌 */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--color-surface-0);
            overflow: hidden;
            font-family: var(--font-family-primary);
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            overscroll-behavior: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* 平板全屏关键：确保 html/body 填满整个屏幕 */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ── 播放器主容器 ── */
        #playerContainer {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-surface-0);
            touch-action: none;
            /* 平板全屏：确保内容区填充所有安全区域 */
            width: 100vw;
            height: 100vh;
            width: 100dvw;
            height: 100dvh;
        }

        /* ── 视频元素 ── */
        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: var(--color-surface-0);
            /* 确保视频占满容器 */
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ── 顶部状态栏 ── */
        #topBar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: max(env(safe-area-inset-top), var(--space-3)) var(--space-4) var(--space-3);
            background: linear-gradient(to bottom,
                rgba(0, 0, 0, 0.85) 0%,
                rgba(0, 0, 0, 0.4) 60%,
                transparent 100%);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            transition: opacity var(--transition-normal);
            z-index: 20;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        #topBar.hidden { opacity: 0; pointer-events: none; }

        #videoCounter {
            color: var(--color-text-secondary);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
            font-family: var(--font-family-mono);
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }
        #videoTitle {
            color: var(--color-text-primary);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        /* ── 底部控制栏 ── */
        #controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: var(--space-4) var(--space-4) max(env(safe-area-inset-bottom), var(--space-4));
            background: linear-gradient(to top,
                rgba(0, 0, 0, 0.9) 0%,
                rgba(0, 0, 0, 0.5) 70%,
                transparent 100%);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            transition: opacity var(--transition-normal);
            z-index: 20;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        #controls.hidden { opacity: 0; pointer-events: none; }

        /* 时间显示 */
        #timeRow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 var(--space-1);
        }
        #timeRow span {
            color: var(--color-text-secondary);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
            font-family: var(--font-family-mono);
            letter-spacing: 0.3px;
        }

        /* 进度条 */
        #progressWrap {
            width: 100%;
            height: 24px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
        }
        #progressTrack {
            width: 100%;
            height: 4px;
            background: var(--color-surface-300);
            border-radius: var(--radius-full);
            overflow: hidden;
            transition: height var(--transition-fast);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }
        #progressWrap:active #progressTrack,
        #progressWrap.dragging #progressTrack { height: 6px; }
        #progressBar {
            height: 100%;
            background: linear-gradient(90deg,
                var(--color-primary-500) 0%,
                var(--color-primary-500) 80%,
                rgba(59, 130, 246, 0.7) 100%);
            border-radius: var(--radius-full);
            width: 0%;
            pointer-events: none;
            will-change: width;
            box-shadow: 0 0 8px var(--color-primary-glow);
        }
        /* 进度拖拽点 */
        #progressThumb {
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--color-primary-500);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        #progressWrap:active #progressThumb,
        #progressWrap.dragging #progressThumb {
            transform: translate(-50%, -50%) scale(1);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6), 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        /* 按钮行 */
        #btnRow {
            display: flex;
            gap: var(--space-2);
            align-items: center;
        }

        .ctrl-btn {
            background: var(--color-surface-100);
            color: var(--color-text-primary);
            border: 1px solid var(--color-surface-200);
            padding: 10px var(--space-4);
            border-radius: var(--radius-2xl);
            cursor: pointer;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            white-space: nowrap;
            transition: all var(--transition-fast);
            -webkit-appearance: none;
            user-select: none;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .ctrl-btn:hover {
            background: var(--color-surface-200);
            transform: translateY(-1px);
        }
        .ctrl-btn:active {
            background: var(--color-surface-300);
            transform: translateY(0) scale(0.96);
        }
        .ctrl-btn.primary {
            background: var(--color-primary-500);
            color: #fff;
            border-color: var(--color-primary-500);
            font-weight: var(--font-weight-semibold);
            box-shadow: var(--shadow-glow);
        }
        .ctrl-btn.primary:hover {
            background: rgba(59, 130, 246, 1);
            box-shadow: 0 0 24px rgba(59, 130, 246, 0.5);
        }
        .ctrl-btn.primary:active {
            background: rgba(37, 99, 235, 0.9);
        }
        #playPauseBtn {
            min-width: 46px;
            text-align: center;
            font-size: 18px;
            padding: 10px var(--space-3);
        }
        #muteBtn {
            min-width: 46px;
            text-align: center;
            padding: 10px var(--space-3);
        }
        #spacer { flex: 1; }

        /* ── 中央播放/暂停提示 ── */
        #playIndicator {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 25;
        }
        #playIndicatorIcon {
            font-size: 72px;
            opacity: 0;
            transform: scale(0.8);
            transition: none;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.6));
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: var(--space-6);
            border-radius: var(--radius-2xl);
        }
        #playIndicatorIcon.show {
            animation: pulseIcon .5s ease forwards;
        }
        @keyframes pulseIcon {
            0%   { opacity: .95; transform: scale(1); }
            50%  { opacity: .95; transform: scale(1.1); }
            100% { opacity: 0;  transform: scale(1.25); }
        }

        /* ── 欢迎空状态 ── */
        #emptyState {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-4);
            z-index: 30;
            background: var(--color-surface-0);
            padding: var(--space-6);
        }
        #emptyState .icon {
            font-size: 88px;
            opacity: .3;
            filter: blur(1px);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        #emptyState h2 {
            color: var(--color-text-primary);
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-semibold);
            margin-bottom: var(--space-1);
        }
        #emptyState p {
            color: var(--color-text-tertiary);
            font-size: var(--font-size-sm);
            text-align: center;
            line-height: var(--line-height-relaxed);
            max-width: 280px;
        }
        #emptyBtnRow {
            display: flex;
            gap: var(--space-3);
            flex-wrap: wrap;
            justify-content: center;
            margin-top: var(--space-2);
        }

        /* ── NAS 弹窗 ── */
        #nasModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #nasModal.hidden { display: none; }
        #nasPanel {
            background: rgba(28, 28, 30, 0.97);
            border-radius: var(--radius-xl);
            padding: var(--space-5) var(--space-5) max(env(safe-area-inset-bottom), var(--space-5));
            width: 92%;
            max-width: 520px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--color-surface-200);
        }
        #nasPanel h3 {
            color: var(--color-text-primary);
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            margin-bottom: var(--space-4);
            text-align: center;
            flex-shrink: 0;
        }

        /* NAS 连接栏 */
        #nasConnectBar {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-4);
            flex-shrink: 0;
        }
        #nasAddress {
            flex: 1;
            padding: var(--space-3) var(--space-4);
            background: var(--color-surface-100);
            border: 1px solid var(--color-surface-200);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-size: var(--font-size-sm);
            font-family: var(--font-family-mono);
            outline: none;
            transition: all var(--transition-fast);
        }
        #nasAddress:focus {
            border-color: var(--color-primary-500);
            box-shadow: 0 0 0 3px var(--color-primary-100);
        }
        #nasAddress::placeholder { color: var(--color-text-tertiary); }
        #nasConnectBtn {
            padding: var(--space-3) var(--space-4);
            background: var(--color-primary-500);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            white-space: nowrap;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-glow);
        }
        #nasConnectBtn:active { transform: scale(0.96); }
        #nasConnectBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* NAS 路径面包屑 */
        #nasBreadcrumb {
            display: flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-2) var(--space-3);
            background: var(--color-surface-50);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-3);
            flex-shrink: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .nas-crumb {
            color: var(--color-text-secondary);
            font-size: var(--font-size-xs);
            white-space: nowrap;
            cursor: pointer;
            padding: 2px var(--space-1);
            border-radius: 4px;
            transition: all var(--transition-fast);
        }
        .nas-crumb:hover { background: var(--color-surface-200); }
        .nas-crumb.active { color: var(--color-primary-500); cursor: default; }
        .nas-crumb.active:hover { background: transparent; }
        .nas-sep {
            color: var(--color-text-tertiary);
            font-size: 10px;
            flex-shrink: 0;
        }

        /* NAS 文件列表 */
        #nasFileList {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-surface-200);
            background: var(--color-surface-50);
            min-height: 0;
        }
        .nas-file-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            cursor: pointer;
            transition: background var(--transition-fast);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .nas-file-item:last-child { border-bottom: none; }
        .nas-file-item:hover { background: var(--color-surface-100); }
        .nas-file-item:active { background: var(--color-surface-200); }
        .nas-file-icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }
        .nas-file-name {
            flex: 1;
            color: var(--color-text-primary);
            font-size: var(--font-size-sm);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .nas-file-name.is-folder { color: var(--color-primary-500); font-weight: var(--font-weight-medium); }
        .nas-file-check {
            width: 22px;
            height: 22px;
            border: 2px solid var(--color-surface-300);
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            font-size: 12px;
            color: transparent;
        }
        .nas-file-check.checked {
            background: var(--color-primary-500);
            border-color: var(--color-primary-500);
            color: #fff;
        }

        /* NAS 空状态 */
        #nasEmpty {
            padding: var(--space-8) var(--space-4);
            text-align: center;
            color: var(--color-text-tertiary);
            font-size: var(--font-size-sm);
        }
        #nasEmpty .nas-empty-icon { font-size: 36px; opacity: 0.4; margin-bottom: var(--space-3); }

        /* NAS 加载中 */
        #nasLoading {
            padding: var(--space-8) var(--space-4);
            text-align: center;
        }
        .nas-spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--color-surface-200);
            border-top-color: var(--color-primary-500);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #nasLoading p {
            margin-top: var(--space-3);
            color: var(--color-text-tertiary);
            font-size: var(--font-size-sm);
        }

        /* NAS 提示信息 */
        #nasTip {
            color: var(--color-text-tertiary);
            font-size: var(--font-size-xs);
            text-align: center;
            padding: var(--space-2) 0;
            flex-shrink: 0;
        }

        /* NAS 底部操作栏 */
        #nasActionRow {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-4);
            flex-shrink: 0;
        }
        #nasActionRow button {
            flex: 1;
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            cursor: pointer;
            border: none;
            font-weight: var(--font-weight-semibold);
            transition: all var(--transition-fast);
        }
        #nasCancelAction {
            background: var(--color-surface-200);
            color: var(--color-text-primary);
        }
        #nasCancelAction:active { background: var(--color-surface-300); }
        #nasPlayAction {
            background: var(--color-primary-500);
            color: #fff;
            box-shadow: var(--shadow-glow);
        }
        #nasPlayAction:active { background: rgba(37, 99, 235, 0.9); }
        #nasPlayAction:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* ── 错误提示 ── */
        #errorToast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(24px);
            background: rgba(239, 68, 68, 0.92);
            color: #fff;
            padding: var(--space-3) var(--space-5);
            border-radius: var(--radius-2xl);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            z-index: 60;
            opacity: 0;
            transition: all var(--transition-normal);
            white-space: nowrap;
            max-width: 85vw;
            text-align: center;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        #errorToast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── 加载指示器 ── */
        #loadingIndicator {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 22;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }
        #loadingIndicator.show { opacity: 1; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 切换动画 ── */
        #videoPlayer.slide-up {
            animation: slideUp .32s cubic-bezier(.4,0,.2,1) forwards;
        }
        #videoPlayer.slide-down {
            animation: slideDown .32s cubic-bezier(.4,0,.2,1) forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(0); opacity: 1; }
            to   { transform: translateY(-30%); opacity: 0; }
        }
        @keyframes slideDown {
            from { transform: translateY(0); opacity: 1; }
            to   { transform: translateY(30%); opacity: 0; }
        }

        /* 隐藏系统文件输入 */
        #fileInput { display: none; }
    </style>
</head>
<body>

<!-- 视频容器 -->
<div id="playerContainer">
    <video id="videoPlayer" playsinline preload="metadata"></video>
</div>

<!-- 顶部信息栏 -->
<div id="topBar" class="hidden">
    <span id="videoCounter">0/0</span>
    <span id="videoTitle">未选择视频</span>
</div>

<!-- 底部控制栏 -->
<div id="controls" class="hidden">
    <div id="progressWrap">
        <div id="progressTrack">
            <div id="progressBar"></div>
        </div>
        <div id="progressThumb"></div>
    </div>
    <div id="timeRow">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
    </div>
    <div id="btnRow">
        <button class="ctrl-btn primary" id="folderBtn">📁 本地文件夹</button>
        <button class="ctrl-btn" id="nasBtn">🌐 局域网/NAS</button>
        <span id="spacer"></span>
        <button class="ctrl-btn" id="playPauseBtn">⏸</button>
        <button class="ctrl-btn" id="muteBtn">🔇</button>
    </div>
</div>

<!-- 中央播放/暂停反馈 -->
<div id="playIndicator">
    <div id="playIndicatorIcon"></div>
</div>

<!-- 加载指示器 -->
<div id="loadingIndicator">
    <div class="spinner"></div>
</div>

<!-- 空状态引导 -->
<div id="emptyState">
    <div class="icon">🎬</div>
    <h2>视频播放器</h2>
    <p>选择本地视频文件夹，或连接 NAS 开始播放</p>
    <p style="color:rgba(255,255,255,.3);font-size:12px;">支持 MP4 · MKV · MOV · WebM · AVI<br>上划切换下一个 · 下划切换上一个</p>
    <div id="emptyBtnRow">
        <button class="ctrl-btn primary" id="emptyFolderBtn">📁 选择本地视频</button>
        <button class="ctrl-btn" id="emptyNasBtn">🌐 局域网/NAS</button>
    </div>
</div>

<!-- NAS 文件浏览器弹窗 -->
<div id="nasModal" class="hidden">
    <div id="nasPanel">
        <h3>🌐 局域网 / NAS 视频浏览</h3>

        <div id="nasConnectBar">
            <input id="nasAddress" type="url" placeholder="http://192.168.1.100:5005" autocomplete="off" autocorrect="off" spellcheck="false">
            <button id="nasConnectBtn">连接</button>
        </div>

        <div id="nasBreadcrumb" style="display:none;"></div>

        <div id="nasFileList">
            <div id="nasEmpty">
                <div class="nas-empty-icon">📂</div>
                <p>输入 NAS / HTTP 服务器地址<br>浏览并选择视频文件</p>
            </div>
        </div>

        <div id="nasTip">支持：SMB/WebDAV/HTTP 目录浏览 · 群晖 · Apache/Nginx 目录</div>

        <div id="nasActionRow">
            <button id="nasCancelAction">取消</button>
            <button id="nasPlayAction" disabled>播放选中 (<span id="nasSelectCount">0</span>)</button>
        </div>
    </div>
</div>

<!-- 隐藏文件选择器（多选视频文件） -->
<input type="file" id="fileInput" accept="video/*,audio/*,.mkv,.avi,.wmv,.rmvb,.rm,.flv,.ts,.mts,.m2ts,.mpg,.mpeg,.3gp" multiple>

<!-- 错误提示条 -->
<div id="errorToast"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   VideoPlayer v3.2
   ─ 基于 v3.1 移除百度网盘，修复 MKV 无声 + 平板全屏
═══════════════════════════════════════════════════════════ */

class VideoPlayer {
    constructor() {
        // DOM 引用
        this.$video         = document.getElementById('videoPlayer');
        this.$container     = document.getElementById('playerContainer');
        this.$topBar        = document.getElementById('topBar');
        this.$controls      = document.getElementById('controls');
        this.$counter       = document.getElementById('videoCounter');
        this.$title         = document.getElementById('videoTitle');
        this.$progress      = document.getElementById('progressBar');
        this.$progressWrap  = document.getElementById('progressWrap');
        this.$progressThumb = document.getElementById('progressThumb');
        this.$currentTime   = document.getElementById('currentTime');
        this.$totalTime     = document.getElementById('totalTime');
        this.$muteBtn       = document.getElementById('muteBtn');
        this.$playPauseBtn  = document.getElementById('playPauseBtn');
        this.$emptyState    = document.getElementById('emptyState');
        this.$nasModal      = document.getElementById('nasModal');
        this.$fileInput     = document.getElementById('fileInput');
        this.$loading       = document.getElementById('loadingIndicator');
        this.$indicatorIcon = document.getElementById('playIndicatorIcon');
        this.$errorToast    = document.getElementById('errorToast');

        // 状态
        this.videos          = [];     // [{name, url, file, isBlob}]
        this.currentIdx      = 0;
        this.isMuted         = false;  // 不再默认静音，优先保证有声音
        this.isPaused        = false;
        this.controlsTimer   = null;
        this.currentBlobUrl  = null;
        this.errorToastTimer = null;
        this.isAnimating     = false;

        // 触摸状态
        this.touchStartY    = 0;
        this.touchStartX    = 0;
        this.touchStartTime = 0;
        this.didSwipe       = false;

        // 进度条拖拽状态
        this.isDraggingProgress = false;

        // 双击检测
        this.lastTapTime = 0;
        this.lastTapX    = 0;

        // NAS 文件浏览器状态
        this.nasBaseUrl = '';
        this.nasCurrentPath = '';
        this.nasSelectedVideos = [];
        this.nasHistory = [];
        this.nasHistoryIdx = 0;
        this.nasAbortCtrl = null;

        this._bindEvents();
    }

    /* ═══════════════════ 事件绑定 ═══════════════════ */
    _bindEvents() {
        // 文件夹 / 文件选择按钮
        const openFile = () => this.$fileInput.click();
        document.getElementById('folderBtn').addEventListener('click', openFile);
        document.getElementById('emptyFolderBtn').addEventListener('click', openFile);
        this.$fileInput.addEventListener('change', e => this._loadLocalFiles(e));

        // NAS 按钮
        document.getElementById('nasBtn').addEventListener('click', () => this._openNasModal());
        document.getElementById('emptyNasBtn').addEventListener('click', () => this._openNasModal());
        document.getElementById('nasCancelAction').addEventListener('click', () => this._closeNasModal());
        document.getElementById('nasPlayAction').addEventListener('click', () => this._playNasSelected());
        document.getElementById('nasConnectBtn').addEventListener('click', () => this._connectNas());
        document.getElementById('nasAddress').addEventListener('keydown', e => {
            if (e.key === 'Enter') this._connectNas();
        });

        // 播放/暂停
        this.$playPauseBtn.addEventListener('click', e => {
            e.stopPropagation();
            this._togglePlayPause();
        });

        // 静音切换
        this.$muteBtn.addEventListener('click', e => {
            e.stopPropagation();
            this._toggleMute();
        });

        // 进度条
        this._bindProgressEvents();

        // 视频原生事件
        this.$video.addEventListener('timeupdate',  () => this._updateProgress());
        this.$video.addEventListener('loadedmetadata', () => this._onMetadata());
        this.$video.addEventListener('ended',       () => this._playNext());
        this.$video.addEventListener('waiting',     () => this._showLoading(true));
        this.$video.addEventListener('canplay',     () => this._showLoading(false));
        this.$video.addEventListener('playing',     () => {
            this._showLoading(false);
            this.isPaused = false;
            this._updatePlayPauseBtn();
        });
        this.$video.addEventListener('pause',       () => {
            this.isPaused = true;
            this._updatePlayPauseBtn();
        });
        this.$video.addEventListener('error',       () => this._onVideoError());

        // 触摸手势
        this.$container.addEventListener('touchstart', e => this._onTouchStart(e), { passive: true });
        this.$container.addEventListener('touchend',   e => this._onTouchEnd(e),   { passive: true });

        // 单击
        this.$container.addEventListener('click', e => {
            if (this.didSwipe) { this.didSwipe = false; return; }
            this._handleTap(e);
        });

        // NAS 弹窗防穿透
        this.$nasModal.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        // 键盘快捷键
        document.addEventListener('keydown', e => this._onKeyDown(e));
    }

    /* ─── 进度条事件 ─── */
    _bindProgressEvents() {
        this.$progressWrap.addEventListener('click', e => {
            if (!this.isDraggingProgress) this._seekByRatio(this._getRatioFromEvent(e));
        });

        this.$progressWrap.addEventListener('touchstart', e => {
            e.stopPropagation();
            this.isDraggingProgress = true;
            this.$progressWrap.classList.add('dragging');
            this._seekByRatio(this._getRatioFromTouch(e.touches[0]));
            this._clearControlsTimer();
        }, { passive: true });

        this.$progressWrap.addEventListener('touchmove', e => {
            if (!this.isDraggingProgress) return;
            e.stopPropagation();
            this._seekByRatio(this._getRatioFromTouch(e.touches[0]));
        }, { passive: true });

        this.$progressWrap.addEventListener('touchend', () => {
            this.isDraggingProgress = false;
            this.$progressWrap.classList.remove('dragging');
            this._showControls();
        });
    }

    _getRatioFromEvent(e) {
        const rect = this.$progressWrap.getBoundingClientRect();
        return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    }
    _getRatioFromTouch(touch) {
        const rect = this.$progressWrap.getBoundingClientRect();
        return Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
    }
    _seekByRatio(ratio) {
        if (!this.$video.duration) return;
        this.$video.currentTime = ratio * this.$video.duration;
        this._setProgressUI(ratio);
    }
    _setProgressUI(ratio) {
        const pct = (ratio * 100).toFixed(2) + '%';
        this.$progress.style.width = pct;
        this.$progressThumb.style.left = pct;
    }

    /* ═══════════════════ 加载本地文件 ═══════════════════ */
    _loadLocalFiles(e) {
        const SUPPORTED = ['.mp4', '.m4v', '.mov', '.mkv', '.webm', '.3gp', '.ts', '.mts', '.m2ts',
                          '.avi', '.wmv', '.flv', '.rmvb', '.rm', '.mpg', '.mpeg', '.ogg', '.ogv'];
        const files = Array.from(e.target.files).filter(f => {
            const ext = (f.name.match(/\.\w+$/) || [''])[0].toLowerCase();
            const type = f.type || '';
            return SUPPORTED.includes(ext) || type.startsWith('video/') || type.startsWith('audio/');
        });

        e.target.value = '';

        if (!files.length) {
            this._showError('未找到支持的视频文件\n支持：MP4、MKV、MOV、WebM、AVI 等');
            return;
        }

        files.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN', { numeric: true, sensitivity: 'base' }));

        this._setPlaylist(files.map(f => ({
            name: f.name,
            file: f,
            isBlob: true
        })));
        this._playAt(0);
    }

    /* ═══════════════════ 加载视频列表（Android Bridge）════════════════════ */
    loadVideoList(uris) {
        if (!uris || uris.length === 0) {
            this._showError('文件夹中没有找到视频文件');
            return;
        }

        const items = uris.map(uri => {
            const uriStr = uri.url || uri;
            const fileName = uriStr.split('/').pop().split('\\').pop() || '未知视频';
            return {
                name: decodeURIComponent(fileName),
                url: uriStr,
                isBlob: false
            };
        });

        items.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN', { numeric: true, sensitivity: 'base' }));

        this._setPlaylist(items);
        this._playAt(0);
    }

    /* ═══════════════════ 播放列表管理 ═══════════════════ */
    _setPlaylist(items) {
        this._revokeCurrentBlob();
        this.videos = items;
        this.currentIdx = 0;
    }

    _playAt(idx, direction = 'down') {
        if (!this.videos.length || this.isAnimating) return;
        idx = ((idx % this.videos.length) + this.videos.length) % this.videos.length;

        if (this.videos.length > 1) {
            this.isAnimating = true;
            const cls = direction === 'down' ? 'slide-up' : 'slide-down';
            this.$video.classList.add(cls);
            setTimeout(() => {
                this.$video.classList.remove(cls);
                this.isAnimating = false;
                this._doPlay(this.videos[idx], idx);
            }, 260);
        } else {
            this._doPlay(this.videos[idx], idx);
        }
    }

    _doPlay(item, idx) {
        this._revokeCurrentBlob();
        this._showLoading(true);

        let url;
        if (item.isBlob) {
            url = URL.createObjectURL(item.file);
            this.currentBlobUrl = url;
        } else {
            url = item.url;
            this.currentBlobUrl = null;
        }

        this.currentIdx = idx;
        this.$video.src = url;
        this.$video.muted = this.isMuted;
        this.$video.load();

        this.$video.play().catch(err => {
            if (err.name !== 'NotAllowedError') {
                this._showError('播放失败：' + err.message);
            }
            this._showControls(6000);
        });

        this._updateUI();
        this._hideEmptyState();
        this._showControls();
    }

    _revokeCurrentBlob() {
        if (this.currentBlobUrl) {
            URL.revokeObjectURL(this.currentBlobUrl);
            this.currentBlobUrl = null;
        }
    }

    /* ═══════════════════ 上 / 下一个 ═══════════════════ */
    _playNext() {
        if (this.videos.length > 1) this._playAt(this.currentIdx + 1, 'down');
        else if (this.videos.length === 1) {
            this.$video.currentTime = 0;
            this.$video.play().catch(() => {});
        }
    }
    _playPrev() {
        if (this.videos.length > 1) this._playAt(this.currentIdx - 1, 'up');
    }

    /* ═══════════════════ 触摸手势 ═══════════════════ */
    _onTouchStart(e) {
        if (e.target.closest('#progressWrap')) return;
        this.touchStartY    = e.touches[0].clientY;
        this.touchStartX    = e.touches[0].clientX;
        this.touchStartTime = Date.now();
        this.didSwipe       = false;
    }

    _onTouchEnd(e) {
        if (e.target.closest('#progressWrap')) return;

        const dy = this.touchStartY - e.changedTouches[0].clientY;
        const dx = this.touchStartX - e.changedTouches[0].clientX;
        const dt = Date.now() - this.touchStartTime;

        const SWIPE_PX = 55;
        const SWIPE_MS = 500;

        if (Math.abs(dy) >= SWIPE_PX && Math.abs(dy) > Math.abs(dx) * 1.2 && dt <= SWIPE_MS) {
            this.didSwipe = true;
            if (dy > 0) this._playNext();
            else        this._playPrev();
        }
    }

    /* ═══════════════════ 点击处理 ═══════════════════ */
    _handleTap(e) {
        if (e.target.closest('#controls') || e.target.closest('#topBar')) return;

        const now = Date.now();
        const x   = e.clientX;
        const dt  = now - this.lastTapTime;
        const dx  = Math.abs(x - this.lastTapX);

        if (dt < 300 && dx < 60) {
            const w = window.innerWidth;
            if (x < w / 3) {
                this._seek(-10);
                this._showIndicator('⏪ 10s');
            } else if (x > w * 2 / 3) {
                this._seek(10);
                this._showIndicator('⏩ 10s');
            } else {
                this._togglePlayPause();
            }
            this.lastTapTime = 0;
        } else {
            this.lastTapTime = now;
            this.lastTapX    = x;
            this._showControls();
        }
    }

    _seek(seconds) {
        if (this.$video.duration) {
            this.$video.currentTime = Math.max(0, Math.min(this.$video.duration, this.$video.currentTime + seconds));
        }
    }

    /* ═══════════════════ 键盘快捷键 ═══════════════════ */
    _onKeyDown(e) {
        switch (e.key) {
            case ' ':          e.preventDefault(); this._togglePlayPause(); break;
            case 'ArrowRight': e.preventDefault(); this._seek(10);  this._showIndicator('⏩ 10s'); break;
            case 'ArrowLeft':  e.preventDefault(); this._seek(-10); this._showIndicator('⏪ 10s'); break;
            case 'ArrowDown':  e.preventDefault(); this._playNext(); break;
            case 'ArrowUp':    e.preventDefault(); this._playPrev(); break;
            case 'm':          this._toggleMute(); break;
        }
    }

    /* ═══════════════════ 播放 / 暂停 ═══════════════════ */
    _togglePlayPause() {
        if (!this.videos.length) return;
        if (this.$video.paused) {
            this.$video.play().catch(() => {});
            this._showIndicator('▶');
        } else {
            this.$video.pause();
            this._showIndicator('⏸');
            this._showControls(4000);
        }
    }
    _updatePlayPauseBtn() {
        this.$playPauseBtn.textContent = this.isPaused ? '▶' : '⏸';
    }

    /* ═══════════════════ 静音 ═══════════════════ */
    _toggleMute() {
        this.isMuted = !this.isMuted;
        this.$video.muted = this.isMuted;
        this._updateMuteBtn();
    }
    _updateMuteBtn() {
        this.$muteBtn.textContent = this.isMuted ? '🔇' : '🔊';
    }

    /* ═══════════════════ 进度更新 ═══════════════════ */
    _updateProgress() {
        const { currentTime, duration } = this.$video;
        if (duration > 0 && !this.isDraggingProgress) {
            this._setProgressUI(currentTime / duration);
        }
        this.$currentTime.textContent = this._formatTime(currentTime);
    }
    _onMetadata() {
        this.$totalTime.textContent = this._formatTime(this.$video.duration);
    }
    _formatTime(sec) {
        if (!isFinite(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    /* ═══════════════════ 错误处理 ═══════════════════ */
    _onVideoError() {
        this._showLoading(false);
        const err = this.$video.error;
        let msg = '视频加载失败';
        if (err) {
            const codes = {1:'用户中断',2:'网络错误',3:'解码失败',4:'格式不支持'};
            msg = codes[err.code] || msg;
        }
        this._showError(msg);
        if (this.videos.length > 1) {
            setTimeout(() => this._playNext(), 3000);
        }
    }
    _showError(msg) {
        clearTimeout(this.errorToastTimer);
        this.$errorToast.textContent = msg;
        this.$errorToast.classList.add('show');
        this.errorToastTimer = setTimeout(() => {
            this.$errorToast.classList.remove('show');
        }, 4000);
    }

    _showLoading(show) {
        this.$loading.classList.toggle('show', show);
    }

    _showIndicator(icon) {
        this.$indicatorIcon.textContent = icon;
        this.$indicatorIcon.classList.remove('show');
        void this.$indicatorIcon.offsetWidth;
        this.$indicatorIcon.classList.add('show');
    }

    /* ═══════════════════ 控制栏 ═══════════════════ */
    _showControls(delay = 3500) {
        this.$topBar.classList.remove('hidden');
        this.$controls.classList.remove('hidden');
        this._clearControlsTimer();
        this.controlsTimer = setTimeout(() => {
            if (!this.isDraggingProgress) {
                this.$topBar.classList.add('hidden');
                this.$controls.classList.add('hidden');
            }
        }, delay);
    }
    _clearControlsTimer() {
        clearTimeout(this.controlsTimer);
    }

    /* ═══════════════════ UI 更新 ═══════════════════ */
    _updateUI() {
        const total = this.videos.length;
        const cur   = this.currentIdx + 1;
        this.$counter.textContent = `${cur}/${total}`;
        this.$title.textContent   = this.videos[this.currentIdx]?.name || '未知';
        this.$progress.style.width = '0%';
        this.$progressThumb.style.left = '0%';
        this.$currentTime.textContent  = '0:00';
        this.$totalTime.textContent    = '0:00';
        this._updateMuteBtn();
        this._updatePlayPauseBtn();
    }

    _hideEmptyState() {
        this.$emptyState.style.display = 'none';
    }

    /* ═══════════════════ NAS 文件浏览器 ═══════════════════ */
    _openNasModal() {
        this.$nasModal.classList.remove('hidden');
        this.nasBaseUrl = '';
        this.nasCurrentPath = '';
        this.nasSelectedVideos = [];
        this.nasHistory = ['/'];
        this.nasHistoryIdx = 0;
        this._updateNasBreadcrumb();
        this._renderNasFileList(null);
    }
    _closeNasModal() {
        this.$nasModal.classList.add('hidden');
        if (this.nasAbortCtrl) {
            try { this.nasAbortCtrl.abort(); } catch(e) {}
            this.nasAbortCtrl = null;
        }
    }

    async _connectNas() {
        const addr = document.getElementById('nasAddress').value.trim();
        if (!addr) { this._showError('请输入服务器地址'); return; }

        let baseUrl = addr;
        if (!/^https?:\/\//i.test(baseUrl)) {
            baseUrl = 'http://' + baseUrl;
            document.getElementById('nasAddress').value = baseUrl;
        }
        baseUrl = baseUrl.replace(/\/+$/, '');

        this.nasBaseUrl = baseUrl;
        this.nasCurrentPath = '/';
        this.nasHistory = ['/'];
        this.nasHistoryIdx = 0;
        this.nasSelectedVideos = [];

        await this._browseNas('/');
    }

    async _browseNas(path) {
        this.nasCurrentPath = path;
        const url = this.nasBaseUrl + path;

        const $list = document.getElementById('nasFileList');
        $list.innerHTML = '<div id="nasLoading"><div class="nas-spinner"></div><p>正在加载...</p></div>';

        if (this.nasAbortCtrl) {
            try { this.nasAbortCtrl.abort(); } catch(e) {}
        }
        this.nasAbortCtrl = new AbortController();

        try {
            const resp = await fetch(url, {
                signal: this.nasAbortCtrl.signal,
                headers: { 'Accept': 'text/html, application/json, */*' }
            });

            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

            const contentType = resp.headers.get('content-type') || '';

            if (contentType.includes('application/json')) {
                const data = await resp.json();
                const items = this._parseJsonListing(data, url);
                this._updateNasBreadcrumb();
                this._renderNasFileList(items);
            } else {
                const html = await resp.text();
                const items = this._parseHtmlListing(html, url);
                this._updateNasBreadcrumb();
                this._renderNasFileList(items);
            }

            this.nasHistory = this.nasHistory.slice(0, this.nasHistoryIdx + 1);
            this.nasHistory.push(path);
            this.nasHistoryIdx = this.nasHistory.length - 1;

        } catch (err) {
            if (err.name === 'AbortError') return;
            $list.innerHTML = `<div id="nasEmpty">
                <div class="nas-empty-icon">⚠️</div>
                <p>无法连接到服务器<br><span style="opacity:.6;font-size:12px;">${this._escapeHtml(err.message)}</span></p>
            </div>`;
        }
    }

    _parseHtmlListing(html, baseUrl) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const items = [];
        const links = doc.querySelectorAll('a[href]');
        const seen = new Set();

        for (const a of links) {
            let href = a.getAttribute('href');
            if (!href || href === './' || href === '../' || href.startsWith('?') || href.startsWith('#')) continue;
            if (href.startsWith('mailto:') || href.startsWith('javascript:')) continue;

            let name = a.textContent.trim();
            if (!name || name.startsWith('?')) continue;
            try { name = decodeURIComponent(name); } catch(e) {}

            const key = href + name;
            if (seen.has(key)) continue;
            seen.add(key);

            const isDir = href.endsWith('/') || a.closest('tr')?.querySelector('td')?.textContent?.match(/^\d{4}-\d{2}-\d{2}/) === null;

            let fullPath;
            if (href.startsWith('http://') || href.startsWith('https://')) {
                fullPath = href;
            } else {
                fullPath = baseUrl.replace(/\/+$/, '') + '/' + href.replace(/^\/+/, '');
            }

            fullPath = fullPath.replace(/\/\.\//g, '/').replace(/\/+/g, '/');
            if (fullPath.endsWith('/')) fullPath = fullPath.slice(0, -1);

            items.push({ name: name.replace(/\/$/, ''), path: fullPath, isDir: isDir, size: 0 });
        }

        return items.length > 0 ? items : null;
    }

    _parseJsonListing(data, baseUrl) {
        const items = [];
        const list = data.Items || data.items || (Array.isArray(data) ? data : []);

        for (const item of list) {
            const name = item.Name || item.name || '';
            const isDir = item.Type === 'Folder' || item.IsFolder || item.type === 'directory';
            const id = item.Id || item.id;

            if (!name) continue;

            let path;
            if (id) {
                path = isDir
                    ? `${baseUrl.replace(/\/Items.*$/, '')}/Items?ParentId=${id}`
                    : `${baseUrl.replace(/\/Items.*$/, '')}/Items/${id}/File`;
            } else {
                path = item.Path || item.path || `${baseUrl}/${name}`;
            }

            items.push({ name, path, isDir, size: item.Size || 0 });
        }

        return items.length > 0 ? items : null;
    }

    _updateNasBreadcrumb() {
        const $bc = document.getElementById('nasBreadcrumb');
        if (!this.nasBaseUrl) { $bc.style.display = 'none'; return; }

        $bc.style.display = 'flex';
        const parts = this.nasCurrentPath.split('/').filter(Boolean);

        let html = `<span class="nas-crumb ${parts.length === 0 ? 'active' : ''}" data-path="/">根</span>`;
        let cumPath = '';
        for (let i = 0; i < parts.length; i++) {
            cumPath += '/' + parts[i];
            const isLast = i === parts.length - 1;
            html += `<span class="nas-sep">›</span>`;
            html += `<span class="nas-crumb ${isLast ? 'active' : ''}" data-path="${this._escapeHtml(cumPath)}">${this._escapeHtml(parts[i])}</span>`;
        }
        $bc.innerHTML = html;

        $bc.querySelectorAll('.nas-crumb:not(.active)').forEach(el => {
            el.addEventListener('click', () => this._browseNas(el.dataset.path));
        });
    }

    _renderNasFileList(items) {
        const $list = document.getElementById('nasFileList');

        if (!items) {
            $list.innerHTML = `<div id="nasEmpty"><div class="nas-empty-icon">📂</div><p>此目录为空或无法解析</p></div>`;
            return;
        }

        items.sort((a, b) => {
            if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
            return a.name.localeCompare(b.name, 'zh-CN', { numeric: true, sensitivity: 'base' });
        });

        if (items.length === 0) {
            $list.innerHTML = `<div id="nasEmpty"><div class="nas-empty-icon">📂</div><p>此目录为空</p></div>`;
            return;
        }

        const videoExts = ['.mp4', '.m4v', '.mov', '.mkv', '.webm', '.3gp', '.ts', '.mts', '.m2ts',
                           '.avi', '.wmv', '.flv', '.rmvb', '.rm', '.mpg', '.mpeg', '.ogg', '.ogv'];
        const isVideo = (name) => {
            const ext = (name.match(/\.\w+$/) || [''])[0].toLowerCase();
            return videoExts.includes(ext);
        };

        let html = '';

        if (this.nasCurrentPath !== '/') {
            html += `<div class="nas-file-item" data-action="back">
                <span class="nas-file-icon">⬆️</span>
                <span class="nas-file-name is-folder">.. 返回上级</span>
            </div>`;
        }

        for (const item of items) {
            if (item.name.startsWith('.')) continue;

            const isVid = isVideo(item.name);
            const icon = item.isDir ? '📁' : (isVid ? '🎬' : '📄');
            const checked = this.nasSelectedVideos.some(v => v.path === item.path);

            if (item.isDir) {
                html += `<div class="nas-file-item" data-action="open" data-path="${this._escapeHtml(item.path)}">
                    <span class="nas-file-icon">${icon}</span>
                    <span class="nas-file-name is-folder">${this._escapeHtml(item.name)}</span>
                    <span style="color:var(--color-text-tertiary);font-size:12px;">›</span>
                </div>`;
            } else if (isVid) {
                html += `<div class="nas-file-item" data-action="toggle" data-path="${this._escapeHtml(item.path)}" data-name="${this._escapeHtml(item.name)}">
                    <span class="nas-file-icon">${icon}</span>
                    <span class="nas-file-name">${this._escapeHtml(item.name)}</span>
                    <span class="nas-file-check ${checked ? 'checked' : ''}">✓</span>
                </div>`;
            }
        }

        if (!html) {
            $list.innerHTML = `<div id="nasEmpty"><div class="nas-empty-icon">📂</div><p>此目录中没有视频文件</p></div>`;
            return;
        }

        $list.innerHTML = html;

        $list.querySelectorAll('.nas-file-item').forEach(el => {
            el.addEventListener('click', () => {
                const action = el.dataset.action;
                if (action === 'back') {
                    const parent = this.nasCurrentPath.substring(0, this.nasCurrentPath.lastIndexOf('/')) || '/';
                    this._browseNas(parent);
                } else if (action === 'open') {
                    this._browseNas(el.dataset.path);
                } else if (action === 'toggle') {
                    const path = el.dataset.path;
                    const name = el.dataset.name;
                    const idx = this.nasSelectedVideos.findIndex(v => v.path === path);
                    const $check = el.querySelector('.nas-file-check');
                    if (idx >= 0) {
                        this.nasSelectedVideos.splice(idx, 1);
                        $check.classList.remove('checked');
                    } else {
                        this.nasSelectedVideos.push({ name, url: path, isBlob: false });
                        $check.classList.add('checked');
                    }
                    this._updateNasSelectCount();
                }
            });
        });
    }

    _updateNasSelectCount() {
        const count = this.nasSelectedVideos.length;
        document.getElementById('nasSelectCount').textContent = count;
        document.getElementById('nasPlayAction').disabled = count === 0;
    }

    _playNasSelected() {
        if (this.nasSelectedVideos.length === 0) return;
        const items = [...this.nasSelectedVideos].sort((a, b) =>
            a.name.localeCompare(b.name, 'zh-CN', { numeric: true, sensitivity: 'base' })
        );
        this._closeNasModal();
        this._setPlaylist(items);
        this._playAt(0);
    }

    _escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }
}

/* ── 初始化 ── */
document.addEventListener('DOMContentLoaded', () => {
    window.__player = new VideoPlayer();

    if (window.AndroidBridge) {
        const ver = AndroidBridge.getAndroidVersion();
        console.log('[VideoPlayer] Android SDK:', ver);
    }
});
